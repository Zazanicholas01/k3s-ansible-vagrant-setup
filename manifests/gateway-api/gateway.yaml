apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-web-gateway
  namespace: default
spec:
  gatewayClassName: nginx
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: files.local
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: filebrowser-tls
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway-access: "shared-web"