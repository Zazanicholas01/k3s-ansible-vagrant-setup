apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: filebrowser
  namespace: smb
spec:
  parentRefs:
    - name: shared-web-gateway
      namespace: default
      sectionName: https
  hostnames:
    - files.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: filebrowser
          port: 80
