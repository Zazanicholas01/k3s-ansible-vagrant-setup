apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-local
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: filebrowser-cert
  namespace: default
spec:
  secretName: filebrowser-tls
  issuerRef:
    name: selfsigned-local
    kind: ClusterIssuer
  commonName: files.local
  dnsNames:
    - files.local
